name: CI macOS Superbuild

on:
  push:
    branches:
      - develop
      - main
      - 'test-pr-*'
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'

permissions:
  contents: read

jobs:
  superbuild-mac:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialise superbuild submodules
        run: |
          git submodule update --init \
            superbuild/openssl superbuild/libsrtp \
            superbuild/usrsctp superbuild/googletest
        shell: bash

      - name: Configure (builds OpenSSL at configure time)
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          export CC=clang CXX=clang++
          cd superbuild
          cmake --preset mac-arm64
        shell: bash

      - name: Build
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          cmake --build superbuild/build-mac-arm64 --parallel $(sysctl -n hw.ncpu)
        shell: bash

      - name: Cleanup
        if: always()
        run: rm -rf superbuild/build-mac-arm64
        shell: bash
