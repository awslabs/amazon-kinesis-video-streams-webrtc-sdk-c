name: Codecov for WebRTC C SDK
on:
  push:
    branches:
      - develop
      - main
      - 'test-pr-*'
    paths-ignore:
      - '**.md'
      - 'doc/**'
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'
      - 'doc/**'

env:
  AWS_KVS_LOG_LEVEL: 3
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: read

jobs:
  linux-gcc-codecov:
    if: ${{ github.repository == 'awslabs/amazon-kinesis-video-streams-webrtc-sdk-c' }}
    runs-on: ubuntu-latest
    container: public.ecr.aws/ubuntu/ubuntu:20.04_stable
    timeout-minutes: 60

    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all history, for Codecov

      - name: Install dependencies
        run: |
          apt-get update
          apt-get -y install git cmake build-essential pkg-config
          apt-get -y install curl

      - name: Check versions
        run: |
          gcc --version
          gcov --version

      - name: Build repository
        run: |
          mkdir build
          cd build
          cmake .. -DCODE_COVERAGE=ON -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_AWS_SDK_IN_TESTS=OFF
          make -j

      - name: Run tests
        working-directory: ./build
        timeout-minutes: 10
        run: |
          ./tst/webrtc_client_test --gtest_break_on_failure

      - name: Generate report
        working-directory: ./build
        shell: bash
        run: |
          for test_file in $(find CMakeFiles/kvsWebrtcClient.dir -name '*.gcno'); do gcov $test_file; done

      - name: Upload report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
